name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused-tests:
    name: Focused tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.lock.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
          python -m pip install --no-deps -e .
          python -m pip check

      - name: Run repository and focused application checks
        env:
          MAGICAI_QUIET_EVALUATION: "1"
          MAGICAI_CONVERSATION_DB: ${{ runner.temp }}/magicai-ci-conversations.sqlite3
        run: python scripts/ci_check.py
