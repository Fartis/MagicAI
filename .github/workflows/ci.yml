name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused-tests:
    name: Focused tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Validate lock file
        run: uv lock --check

      - name: Install locked dependencies
        run: |
          uv sync --frozen
          uv pip check

      - name: Run repository and focused application checks
        env:
          MAGICAI_QUIET_EVALUATION: "1"
          MAGICAI_CONVERSATION_DB: ${{ runner.temp }}/magicai-ci-conversations.sqlite3
        run: uv run --frozen python scripts/ci_check.py
