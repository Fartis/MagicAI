name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  focused-tests:
    name: Focused tests (Python 3.12)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.28"
          enable-cache: true

      - name: Validate and install locked dependencies
        run: |
          uv lock --check
          uv sync --frozen
          uv pip check

      - name: Run repository and focused application checks
        env:
          MAGICAI_QUIET_EVALUATION: "1"
          MAGICAI_CONVERSATION_DB: ${{ runner.temp }}/magicai-ci-conversations.sqlite3
        run: uv run --frozen python scripts/ci_check.py